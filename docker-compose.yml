services:
  mariadb:
    image: mariadb:11.7
    container_name: backend_mariadb
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-curriculum_db}
      MYSQL_USER: ${DB_USER:-curriculum_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-curriculum_pass}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: backend_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
    depends_on:
      mariadb:
        condition: service_healthy

  ollama:
    image: ollama/ollama:latest
    container_name: backend_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_NUM_PARALLEL=4
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_KEEP_ALIVE=24h
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3

  ollama-init:
    image: ollama/ollama:latest
    container_name: backend_ollama_init
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: >
      sh -c "
        ollama pull ${GEMMA_MODEL:-gemma3:4b} &&
        echo 'Model pulled successfully'
      "
    environment:
      - OLLAMA_HOST=http://ollama:11434
    restart: "no"

  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend_fastapi
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - GEMMA_MODEL=${GEMMA_MODEL:-gemma3:4b}
    depends_on:
      ollama:
        condition: service_healthy
      mariadb:
        condition: service_healthy
    volumes:
      - .:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; r=urllib.request.urlopen('http://localhost:8000/health'); sys.exit(0 if r.getcode()==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  ollama_data:
    name: backend_ollama_data
  mariadb_data:
    name: backend_mariadb_data
